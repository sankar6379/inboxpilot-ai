services:
  - type: web
    name: inboxpilot-app
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile

    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: inboxpilot-postgres
          property: connectionString

      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: inboxpilot-postgres
          property: user

      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: inboxpilot-postgres
          property: password

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

databases:
  - name: inboxpilot-postgres
    databaseName: inboxpilot
    user: inboxpilot
    plan: free
